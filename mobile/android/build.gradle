// Force CMake 4.1.2 (bundled ninja 1.12.1) for every native module. ninja 1.12+
// supports Windows long paths (>260 chars), which the new-architecture codegen
// build outputs (e.g. react-native-gesture-handler) exceed on deep project paths.
// The default toolchain (CMake 3.22.1 / ninja 1.10.2) fails with
// "ninja: error: Stat(...): Filename longer than 260 characters".
// Use gradle.projectsEvaluated so this runs AFTER every project's afterEvaluate
// (including the React Native plugin's, which otherwise leaves the :app module on
// AGP's default CMake 3.22.1 / ninja 1.10.2). Compatible with --configure-on-demand.
gradle.projectsEvaluated {
  rootProject.subprojects.each { project ->
    try {
      def androidExt = project.extensions.findByName('android')
      if (androidExt != null) {
        androidExt.externalNativeBuild.cmake.version = '4.1.2'
        // Allow CMake 4 to configure modules that still declare an old
        // cmake_minimum_required (<3.5), which CMake 4 otherwise rejects.
        androidExt.externalNativeBuild.cmake.arguments '-DCMAKE_POLICY_VERSION_MINIMUM=3.5'
      }
    } catch (Throwable ignored) {}
  }
